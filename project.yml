name: PromptExplorer
options:
  bundleIdPrefix: com.openclaw
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  ComposableArchitecture:
    url: https://github.com/pointfreeco/swift-composable-architecture
    from: "1.17.0"
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"
  OpenClawKit:
    url: https://github.com/Diomandeee/OpenClawKit
    exactVersion: "1.0.2"

settings:
  base:
    SWIFT_VERSION: "5"
    TARGETED_DEVICE_FAMILY: "1"
    SWIFT_STRICT_CONCURRENCY: complete

targets:
  PromptExplorer:
    type: application
    platform: iOS
    sources:
      - path: PromptExplorer
    resources:
      - path: PromptExplorer/Assets.xcassets
    dependencies:
      - package: ComposableArchitecture
      - package: Supabase
      - package: OpenClawKit
        product: OpenClawCore
      - package: OpenClawKit
        product: OpenClawSupabase
    info:
      path: PromptExplorer/Info.plist
      properties:
        CFBundleDisplayName: "Prompt Explorer"
        CFBundleIconName: AppIcon
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.openclaw.promptexplorer
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: "8643C988C4"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: "YES"
    developmentTeam: "8643C988C4"

  PromptExplorerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PromptExplorerTests
    dependencies:
      - target: PromptExplorer
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.openclaw.promptexplorer.tests
